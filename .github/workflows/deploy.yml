name: KSP Portal CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: cd client && npm ci

      - name: TypeScript Type Check
        run: cd client && npx tsc --noEmit

      - name: Install Backend Dependencies
        run: cd functions/ksp && npm ci

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build Client
        run: |
          cd client && npm ci && npm run build

      - name: Install Backend Dependencies
        run: cd functions/ksp && npm ci

      - name: Verify Server Starts
        run: |
          cd functions/ksp
          timeout 10 node server.js &
          sleep 5
          curl -f http://localhost:3001/api/health/live || exit 1
        env:
          PORT: 3001

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ksp-crime-portal:${{ github.sha }} .

      - name: Test Docker Container
        run: |
          docker run -d --name ksp-test -p 3001:3001 ksp-crime-portal:${{ github.sha }}
          sleep 10
          curl -f http://localhost:3001/api/health/live || exit 1
          docker stop ksp-test
          docker rm ksp-test
