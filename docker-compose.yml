# KSP Crime Intelligence Portal — Docker Compose
# Phase 7: Local development and production orchestration

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-ksp-crime-intel-jwt-secret-2026-karnataka-police}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CCTNS_API_BASE=${CCTNS_API_BASE:-}
      - CCTNS_API_KEY=${CCTNS_API_KEY:-}
      - ICJS_API_BASE=${ICJS_API_BASE:-}
      - ICJS_API_KEY=${ICJS_API_KEY:-}
    volumes:
      - db-data:/app/datastore
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
    driver: local
